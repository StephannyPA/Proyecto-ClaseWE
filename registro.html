<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informacion</title>

    <!-- FRAMEWORK BOOSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- LIBRERÍA DE FUENTES -->
     <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

     <!-- LIBRERÍA DE ICONOS FONTAWESOME -->
      <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

      <!-- FAVICON: ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
       <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">

       <!-- <link rel="stylesheet" href="css/normalize.css"> -->

       <!-- HOJA DE ESTILOS CSS -->
        <link rel="stylesheet" href="css/styles.css">


</head>

<body>

<form action="#" method="post" class="registro"> 

            <!-- ENCABEZADO FORMULARIO -->
    
                    <h4 class="titulo-registro">Regístrate aquí para más información</h3>
                    <p class="subtitulo-registro">Te contactaremos a la brevedad.</p>
                    
                    <!-- DESPLEGABLE 1 -->
                       
                     <section class="select-container">
                     <select id="pais" name="pais" required>
                        <option value="" disabled selected hidden> ¿Qué producto te interesa?</option>
                        <option value="peru">Carreras</option>
                        <option value="mexico">Diplomado</option>
                        <option value="colombia">Cursos</option>
                    </select>                             
                    <i class="fa-solid fa-chevron-down"></i>
                    </section>

                    <!-- DESPLEGABLE 2 -->
                    
                     <section class="select-container">
                     <select id="pais" name="pais" required>
                        <option value="" disabled selected hidden> ¿Qué carrera te gustaría estudiar?</option>
                        <option value="">Medicina</option>
                        <option value="">Ingeniería Civil</option>
                        <option value="">Administración de Empresas</option>
                        <option value="">Derecho</option>
                        <option value="">Psicología</option>
                        <option value="">Arquitectura</option>
                        <option value="">Ingeniería de Sistemas</option>
                        <option value="">Diseño Gráfico</option>
                            
                    </select>                             
                    <i class="fa-solid fa-chevron-down"></i>
                    </section>

                    <!-- DESPLEGABLE 3 -->
                    
                     <section class="select-container">
                     <select id="pais" name="pais" required>
                        <option value="" disabled selected hidden> Elige el campus</option>
                        <option value="peru">Campus San Miguel</option>
                        <option value="mexico">Campus Monterrico</option>
                        <option value="colombia">Campus Los Olivos</option>
                        <option value="colombia">Campus Lima Centro</option>
                        <option value="colombia">Campus La Molina</option>
                    </select>                             
                    <i class="fa-solid fa-chevron-down"></i>
                    </section>

                    <!-- SECCIONES DE REGISTRO -->

                    <!-- NOMBRES -->
                                    
                    <input type="text" class="input-textarea" placeholder="Apellidos y Nombres" required>
                    
                    <!-- CORREO -->
                    
                    <input type="email" class="input-textarea" placeholder="Correo electrónico" required>
  
                    <!-- CELULAR -->
  
                    <input type="tel" class="input-textarea" placeholder="Celular" required> 
                   
                    <!-- BOTÓN DE OPCIONES -->

                    <p class="form-group">¿Cómo nos comunicamos contigo?</p>

                    <section class="form-group">                     

                        <label>
                            <input type="radio" name="contact" checked>
                            WhatsApp
                        </label>

                        <label>
                            <input type="radio" name="contact">
                            Llamada
                        </label>
                       
                    </section>

                    <!-- CHECKBOX -->

                    <section class="form-group">
                        <label>
                            <input type="checkbox" required>
                            Acepto las <a href="">políticas de privacidad</a> y los <a href="">términos y condiciones.</a>
                        </label>
                    </section>

                    <!-- BOTÓN -->

                    <button type="submit" class="botonContacto">
                        Enviar
                    </button>     
        </section>

    </section>
</form>
</article>

</body>

</html>
